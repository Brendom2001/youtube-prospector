<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Prospector</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #070b13;
      color: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(46, 125, 221, 0.18), transparent 28%),
        linear-gradient(180deg, #070b13 0%, #05070c 100%);
    }

    header {
      padding: 32px 24px 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1d4ed8, #9333ea);
      display: grid;
      place-items: center;
      font-weight: 800;
      color: white;
      box-shadow: 0 24px 60px rgba(25, 118, 210, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 2.4vw, 3rem);
      letter-spacing: -0.04em;
    }

    p.lead {
      margin: 14px 0 0;
      max-width: 860px;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .panel {
      margin: 28px auto 0;
      max-width: 1200px;
      padding: 28px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 40px 120px rgba(15, 23, 42, 0.45);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: #0f172a;
      color: #f8fafc;
      padding: 14px 16px;
      font-size: 0.96rem;
      outline: none;
    }

    input:focus,
    select:focus,
    button:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    button.primary {
      background: #2563eb;
      color: #fff;
      border-color: transparent;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    button.primary:hover {
      transform: translateY(-1px);
      background: #1d4ed8;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .results-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      max-width: 1200px;
      margin: 24px auto 12px;
      padding: 0 24px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .badge-btn {
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(226, 232, 240, 0.06);
      color: #cbd5e1;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .badge-btn.active {
      background: #2563eb;
      color: white;
      border-color: transparent;
    }

    .grid {
      display: grid;
      gap: 20px;
      padding: 0 24px 48px;
      max-width: 1200px;
      margin: 0 auto;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }

    .card {
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 24px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: #1e293b;
      object-fit: cover;
      flex-shrink: 0;
    }

    .channel-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .channel-meta {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(37, 99, 235, 0.12);
      color: #93c5fd;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .badge-label {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      color: #cbd5e1;
      font-size: 0.86rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .score {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    .message-box {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.1);
      padding: 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.65;
      color: #e2e8f0;
      white-space: pre-wrap;
      min-height: 110px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .actions a,
    .actions button {
      color: #f8fafc;
    }

    .copy-btn {
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: transparent;
      padding: 12px 16px;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .copy-btn:hover {
      background: rgba(37, 99, 235, 0.14);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 11, 19, 0.8);
    }

    .loading-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 8px solid rgba(148, 163, 184, 0.18);
      border-top-color: #2563eb;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .note {
      color: #94a3b8;
      font-size: 0.92rem;
      margin-top: 5px;
    }

    @media (max-width: 760px) {
      .panel {
        padding: 20px;
      }

      .results-header,
      .grid {
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-icon">YT</div>
      <div>
        <h1>YouTube Prospector</h1>
        <p class="lead">Encontre criadores ativos com edição simples ou inconsistente e gere mensagens de abordagem prontas para outreach.</p>
      </div>
    </div>
    <div class="panel">
      <form id="search-form" autocomplete="off">
        <div class="form-row">
          <label>
            Nicho
            <input type="text" id="niche" placeholder="Ex: fitness, culinária, finanças pessoais" required />
          </label>
          <label>
            Idioma
            <select id="language">
              <option value="pt">Português</option>
              <option value="en">Inglês</option>
            </select>
          </label>
          <label>
            Tamanho do canal
            <select id="size">
              <option value="micro">Micro (1k-50k)</option>
              <option value="medio">Médio (50k-500k)</option>
              <option value="grande">Grande (500k+)</option>
            </select>
          </label>
          <label>
            Quantidade
            <input type="number" id="quantity" min="5" max="20" value="10" />
          </label>
        </div>
        <div class="stats">
          <span>Busca com YouTube Data API</span>
          <span>Ativo: 2+ uploads/mês</span>
          <span>Filtro por edição simples / inconsistente</span>
        </div>
        <button class="primary" type="submit">Buscar canais</button>
      </form>
    </div>
  </header>

  <section class="results-header">
    <div>
      <h2 id="results-title">Resultados</h2>
      <p id="results-summary" class="note">Use a busca acima para começar.</p>
    </div>
    <div class="badges">
      <button class="badge-btn active" data-filter="all">Todos</button>
      <button class="badge-btn" data-filter="EDIÇÃO SIMPLES">EDIÇÃO SIMPLES</button>
      <button class="badge-btn" data-filter="INCONSISTENTE">INCONSISTENTE</button>
      <button class="badge-btn" data-filter="VOLUME ALTO">VOLUME ALTO</button>
    </div>
  </section>

  <main class="grid" id="results-grid"></main>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script>
    const form = document.getElementById('search-form');
    const resultsGrid = document.getElementById('results-grid');
    const resultsSummary = document.getElementById('results-summary');
    const loadingOverlay = document.getElementById('loading-overlay');
    const badgeButtons = document.querySelectorAll('.badge-btn');
    let currentResults = [];
    let activeFilter = 'all';

    function formatNumber(value) {
      return new Intl.NumberFormat('pt-BR').format(value);
    }

    function showLoading(show) {
      loadingOverlay.classList.toggle('visible', show);
    }

    function renderResults(items) {
      resultsGrid.innerHTML = '';
      if (!items.length) {
        resultsSummary.textContent = 'Nenhum canal qualificado encontrado. Tente outro nicho ou ajuste os filtros.';
        return;
      }

      resultsSummary.textContent = `${items.length} canal${items.length === 1 ? '' : 'es'} qualificado${items.length === 1 ? '' : 's'} encontrado${items.length === 1 ? '' : 's'}.`; 

      items.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';
        card.dataset.badge = item.badge;

        card.innerHTML = `
          <div class="card-header">
            <img class="avatar" src="${item.thumbnail}" alt="${item.title}" />
            <div>
              <h3 class="channel-title">${item.title}</h3>
              <div class="channel-meta">${formatNumber(item.subscribers)} inscritos • ${formatNumber(item.views)} views totais</div>
            </div>
          </div>
          <div class="pill">${item.badge}</div>
          <div class="channel-meta">Frequência: ${item.frequency.toFixed(1)} vídeos/mês • Consistência: ${item.consistency}</div>
          <div class="message-box">${item.approachMessage}</div>
          <div class="actions">
            <button class="copy-btn" type="button">Copiar mensagem</button>
            <a href="${item.channelUrl}" target="_blank" rel="noopener noreferrer" class="pill">Abrir canal</a>
          </div>
          <div class="channel-meta">Score: <strong>${item.score}/10</strong> • ${item.justification}</div>
        `;

        const copyButton = card.querySelector('.copy-btn');
        copyButton.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(item.approachMessage);
            copyButton.textContent = 'Copiado!';
            setTimeout(() => {
              copyButton.textContent = 'Copiar mensagem';
            }, 1700);
          } catch (err) {
            copyButton.textContent = 'Erro ao copiar';
          }
        });

        resultsGrid.appendChild(card);
      });
    }

    function filterResults() {
      const filtered = currentResults.filter(item => activeFilter === 'all' || item.badge === activeFilter);
      renderResults(filtered);
    }

    badgeButtons.forEach(button => {
      button.addEventListener('click', () => {
        badgeButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        activeFilter = button.dataset.filter;
        filterResults();
      });
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();
      const niche = document.getElementById('niche').value.trim();
      const language = document.getElementById('language').value;
      const size = document.getElementById('size').value;
      const quantity = Number(document.getElementById('quantity').value);

      if (!niche) {
        resultsSummary.textContent = 'Informe um nicho válido antes de buscar.';
        return;
      }

      showLoading(true);
      resultsSummary.textContent = 'Buscando canais…';
      resultsGrid.innerHTML = '';

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ niche, language, size, quantity })
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          resultsSummary.textContent = error.error || 'Erro ao buscar canais. Tente novamente.';
          return;
        }

        const { results } = await response.json();
        currentResults = results || [];
        activeFilter = 'all';
        badgeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === 'all'));
        filterResults();
      } catch (error) {
        resultsSummary.textContent = 'Falha na conexão ou timeout. Tente novamente.';
      } finally {
        showLoading(false);
      }
    });
  </script>
</body>
</html>
