<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreatorHunt - Outreach Inteligente</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --border-color: #222230;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a8;
      --accent-red: #ff0000;
      --accent-orange: #ff6b35;
      --accent-yellow: #ffd700;
      --accent-hover: #cc0000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
    }

    /* Navbar */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: rgba(10, 10, 15, 0.95);
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
      padding: 14px 32px;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-red);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #00ff00;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #00ff00;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Hero Section */
    .hero {
      margin-top: 64px;
      padding: 80px 32px 60px;
      text-align: center;
    }

    .hero-title {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 20px;
      line-height: 1.1;
    }

    .hero-title-part1 {
      color: var(--text-primary);
      display: block;
    }

    .hero-title-part2 {
      display: block;
      background: linear-gradient(135deg, #ff6b35, #ff0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 40px;
    }

    /* Search Card */
    .search-card {
      max-width: 1000px;
      margin: 0 auto 60px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .search-form {
      display: grid;
      gap: 20px;
    }

    .search-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input,
    .form-select {
      padding: 14px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--accent-red);
      box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.1);
    }

    .form-select {
      cursor: pointer;
    }

    .search-btn {
      grid-column: 1 / -1;
      padding: 16px 32px;
      background: var(--accent-red);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .search-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    .search-btn-icon {
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(5px);
    }

    .loading-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid var(--border-color);
      border-top-color: var(--accent-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Results Section */
    .results-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }

    .results-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
    }

    .results-title {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .results-count {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .badge-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .badge-filter-btn {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-filter-btn:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .badge-filter-btn.active {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: #fff;
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--accent-red);
      box-shadow: 0 10px 40px rgba(255, 0, 0, 0.1);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--border-color);
    }

    .card-title-block {
      flex: 1;
    }

    .card-title {
      margin: 0 0 4px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-red);
    }

    .card-title a {
      color: inherit;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .card-title a:hover {
      opacity: 0.8;
    }

    .card-stats {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: grid;
      grid-template-columns: auto auto;
      gap: 8px;
      line-height: 1.4;
    }

    .card-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: fit-content;
    }

    .badge-simple {
      background: rgba(255, 107, 53, 0.2);
      color: var(--accent-orange);
    }

    .badge-inconsistent {
      background: rgba(255, 215, 0, 0.2);
      color: var(--accent-yellow);
    }

    .badge-high-volume {
      background: rgba(255, 0, 0, 0.2);
      color: var(--accent-red);
    }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      padding: 16px;
      background: var(--bg-primary);
      border-radius: 10px;
    }

    .meta-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meta-label {
      font-weight: 500;
    }

    .meta-value {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* Score Bar */
    .score-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .score-label {
      color: var(--text-secondary);
      font-weight: 600;
    }

    .score-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-red);
    }

    .score-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-primary);
      border-radius: 4px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-orange), var(--accent-red));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .justification {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-style: italic;
      padding: 12px 0;
      border-top: 1px solid var(--border-color);
    }

    .message-box {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-primary);
      min-height: 100px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .copy-btn,
    .channel-link {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center;
    }

    .copy-btn:hover,
    .channel-link:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
      background: rgba(255, 0, 0, 0.05);
    }

    .copy-btn.copied {
      border-color: #00ff00;
      color: #00ff00;
      background: rgba(0, 255, 0, 0.05);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav {
        padding: 12px 16px;
      }

      .nav-container {
        gap: 12px;
      }

      .logo {
        font-size: 1rem;
      }

      .nav-right {
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }

      .hero {
        padding: 60px 16px 40px;
        margin-top: 56px;
      }

      .hero-title {
        font-size: 2rem;
      }

      .search-card {
        padding: 20px;
        margin: 0 16px 40px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .results-section {
        padding: 0 16px 60px;
      }

      .results-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .badge-filters {
        width: 100%;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="nav-container">
      <div class="logo">
        <div class="logo-icon">▶</div>
        <span>CreatorHunt</span>
      </div>
      <div class="nav-right">
        <div class="tagline">Outreach Inteligente</div>
        <div class="status-indicator">
          <div class="status-dot"></div>
          ONLINE
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <h1 class="hero-title">
      <span class="hero-title-part1">Encontre criadores que</span>
      <span class="hero-title-part2">precisam de um editor</span>
    </h1>
    <p class="hero-subtitle">
      Busque canais ativos com edição simples ou inconsistente e receba mensagens de abordagem personalizadas geradas por IA.
    </p>

    <!-- Search Card -->
    <div class="search-card">
      <form id="search-form" class="search-form" autocomplete="off">
        <div class="search-row">
          <div class="form-group">
            <label class="form-label">Nicho</label>
            <input 
              type="text" 
              id="niche" 
              class="form-input" 
              list="niche-options"
              placeholder="Escolha ou digite um nicho" 
              required 
            />
            <datalist id="niche-options">
              <option value="Fitness" />
              <option value="Culinária" />
              <option value="Finanças Pessoais" />
              <option value="Desenvolvimento Web" />
              <option value="Design Gráfico" />
              <option value="Marketing Digital" />
              <option value="Produtividade" />
              <option value="Fotografia" />
              <option value="Viagens" />
              <option value="Saúde e Bem-estar" />
              <option value="Tecnologia" />
              <option value="Games" />
              <option value="Música" />
              <option value="Educação" />
              <option value="Negócios" />
              <option value="Lifestyle" />
              <option value="Beleza e Maquiagem" />
              <option value="Humor e Comédia" />
              <option value="Cinema e Séries" />
              <option value="Podcasts" />
            </datalist>
          </div>
          <div class="form-group">
            <label class="form-label">Idioma</label>
            <select id="language" class="form-select">
              <option value="pt">Português</option>
              <option value="en">Inglês</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Tamanho</label>
            <select id="size" class="form-select">
              <option value="nano">Nano (1k - 10k)</option>
              <option value="micro">Micro (10k - 50k)</option>
              <option value="pequeno">Pequeno (50k - 100k)</option>
              <option value="medio">Médio (100k - 500k)</option>
              <option value="grande">Grande (500k - 1M)</option>
              <option value="mega">Mega (1M+)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Quantidade</label>
            <select id="quantity" class="form-select">
              <option value="5">5 canais</option>
              <option value="10" selected>10 canais</option>
              <option value="15">15 canais</option>
              <option value="20">20 canais</option>
            </select>
          </div>
        </div>
        <button type="submit" class="search-btn">
          <span class="search-btn-icon">🔍</span>
          Buscar Canais
        </button>
      </form>
    </div>
  </section>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Results Section -->
  <section class="results-section" id="results-section" style="display: none;">
    <div class="results-header">
      <div>
        <h2 class="results-title">Resultados</h2>
        <p class="results-count" id="results-summary"></p>
      </div>
      <div class="badge-filters">
        <button class="badge-filter-btn active" data-filter="all">Todos</button>
        <button class="badge-filter-btn" data-filter="EDIÇÃO SIMPLES">Edição Simples</button>
        <button class="badge-filter-btn" data-filter="INCONSISTENTE">Inconsistente</button>
        <button class="badge-filter-btn" data-filter="VOLUME ALTO">Volume Alto</button>
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </section>

  <script>
    const form = document.getElementById('search-form');
    const loadingOverlay = document.getElementById('loading-overlay');
    const resultsSection = document.getElementById('results-section');
    const cardsGrid = document.getElementById('cards-grid');
    const resultsSummary = document.getElementById('results-summary');
    const badgeFilterButtons = document.querySelectorAll('.badge-filter-btn');

    let allResults = [];
    let activeFilter = 'all';

    function formatNumber(value) {
      if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
      if (value >= 1000) return (value / 1000).toFixed(1) + 'K';
      return String(value);
    }

    function getBadgeClass(badge) {
      if (badge === 'EDIÇÃO SIMPLES') return 'badge-simple';
      if (badge === 'INCONSISTENTE') return 'badge-inconsistent';
      if (badge === 'VOLUME ALTO') return 'badge-high-volume';
      return 'badge-simple';
    }

    function renderCard(item) {
      const scorePercent = (item.score / 10) * 100;
      const badgeClass = getBadgeClass(item.badge);

      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.badge = item.badge;

      card.innerHTML = `
        <div class="card-header">
          <img class="card-avatar" src="${item.thumbnail}" alt="${item.title}" />
          <div class="card-title-block">
            <h3 class="card-title">
              <a href="${item.channelUrl}" target="_blank" rel="noopener noreferrer">${item.title}</a>
            </h3>
            <div class="card-stats">
              <span>${formatNumber(item.subscribers)} inscritos</span>
              <span>${formatNumber(item.views)} views</span>
            </div>
          </div>
        </div>

        <div class="card-badge ${badgeClass}">${item.badge}</div>

        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-label">Upload/Mês</span>
            <span class="meta-value">${item.frequency.toFixed(1)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Consistência</span>
            <span class="meta-value">${item.consistency}</span>
          </div>
        </div>

        <div class="score-block">
          <div class="score-header">
            <span class="score-label">Score de Oportunidade</span>
            <span class="score-value">${item.score}/10</span>
          </div>
          <div class="score-bar">
            <div class="score-fill" style="width: ${scorePercent}%"></div>
          </div>
        </div>

        <div class="justification">${item.justification}</div>

        <div class="message-box">${item.approachMessage}</div>

        <div class="card-actions">
          <button class="copy-btn" type="button">Copiar Mensagem</button>
          <a class="channel-link" href="${item.channelUrl}" target="_blank" rel="noopener noreferrer">Visitar Canal</a>
        </div>
      `;

      const copyBtn = card.querySelector('.copy-btn');
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(item.approachMessage);
          copyBtn.textContent = '✓ Copiado';
          copyBtn.classList.add('copied');
          setTimeout(() => {
            copyBtn.textContent = 'Copiar Mensagem';
            copyBtn.classList.remove('copied');
          }, 2000);
        } catch (error) {
          copyBtn.textContent = '✗ Erro';
        }
      });

      return card;
    }

    function filterAndRender() {
      const filtered = activeFilter === 'all'
        ? allResults
        : allResults.filter(item => item.badge === activeFilter);

      cardsGrid.innerHTML = '';
      resultsSummary.textContent = `${filtered.length} canal${filtered.length === 1 ? '' : 'es'} encontrado${filtered.length === 1 ? '' : 's'}`;

      filtered.forEach(item => {
        cardsGrid.appendChild(renderCard(item));
      });
    }

    badgeFilterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        badgeFilterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        filterAndRender();
      });
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const niche = document.getElementById('niche').value.trim();
      const language = document.getElementById('language').value;
      const size = document.getElementById('size').value;
      const quantity = document.getElementById('quantity').value;

      if (!niche) {
        alert('Informe um nicho antes de buscar.');
        return;
      }

      loadingOverlay.classList.add('visible');
      resultsSection.style.display = 'none';

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ niche, language, size, quantity })
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.error || 'Erro ao buscar canais');
        }

        const { results } = await response.json();
        allResults = results || [];
        activeFilter = 'all';

        badgeFilterButtons.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.filter === 'all');
        });

        resultsSection.style.display = 'block';
        filterAndRender();
      } catch (error) {
        alert(`Erro: ${error.message}`);
        resultsSummary.textContent = error.message;
      } finally {
        loadingOverlay.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
